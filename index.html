<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>盖洛普才干应用工具</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <div class="brand">
          <span class="mark"></span>
          <div>
            <h1>盖洛普才干应用工具</h1>
            <p>34 才干 · 四大领域</p>
          </div>
        </div>

        <section class="user-panel">
          <label class="user-field">
            <span>用户名</span>
            <input id="usernameInput" list="userList" autocomplete="off" placeholder="输入用户名注册或进入" />
            <datalist id="userList"></datalist>
          </label>
          <div class="user-actions">
            <button id="userLoginButton" type="button">注册 / 进入</button>
            <button id="userClearButton" type="button">退出</button>
          </div>
          <p id="userStatus">当前未登录，输入用户名后会自动记住才干结果。</p>
        </section>

        <label class="search">
          <span>才干标题</span>
          <input id="talentInput" list="talentList" autocomplete="off" placeholder="如：战略、成就、沟通" />
          <datalist id="talentList"></datalist>
        </label>

        <section class="test-panel">
          <div class="segmented" id="testStatus" aria-label="测试状态">
            <button class="is-active" type="button" data-status="untested">没做测试</button>
            <button type="button" data-status="tested">已做测试</button>
            <button type="button" data-status="combination">才干组合</button>
          </div>

          <div class="result-entry" id="resultEntry" hidden>
            <div class="import-box">
              <input id="resultFileInput" type="file" accept="application/pdf,image/*" hidden />
              <button id="resultImportButton" type="button">导入测评结果</button>
              <span id="importStatus">PDF / 图片</span>
            </div>
            <div class="segmented compact" id="resultScope" aria-label="结果范围">
              <button class="is-active" type="button" data-count="5">前五才干</button>
              <button type="button" data-count="10">前十才干</button>
            </div>
            <div class="rank-grid" id="rankGrid"></div>
          </div>

          <div class="combo-entry" id="comboEntry" hidden>
            <div class="combo-grid">
              <label class="combo-field">
                <span>才干一</span>
                <input id="comboTalentA" list="talentList" autocomplete="off" placeholder="选择第一个才干" />
              </label>
              <label class="combo-field">
                <span>才干二</span>
                <input id="comboTalentB" list="talentList" autocomplete="off" placeholder="选择第二个才干" />
              </label>
            </div>
            <p>从 34 个才干中任选两个，右侧会展示它们的组合页面。</p>
          </div>
        </section>

        <div class="domains" id="domainTabs" aria-label="才干领域"></div>
        <div class="talent-list" id="talentListView"></div>
      </aside>

      <section class="viewer" aria-live="polite">
        <div class="viewer-head">
          <div>
            <div class="domain-line">
              <span class="domain-badge" id="domainBadge"></span>
              <span class="domain-description" id="domainDescription"></span>
            </div>
            <h2 id="activeTitle"></h2>
            <p id="activeMeta"></p>
          </div>
          <a class="pdf-link" id="pdfLink" target="_blank" rel="noreferrer">PDF</a>
        </div>

        <div class="page-stage">
          <img id="pageImage" alt="" />
          <div class="ordered-pages" id="orderedPages"></div>
          <div class="empty" id="emptyState">未找到匹配才干</div>
        </div>
      </section>
    </main>

    <script src="./app.js?v=11" defer></script>
  </body>
</html>
